name: Build eBPF with Bumblebee and Push (Final RAW Download)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector
  BEE_VERSION: v0.3.1

jobs:
  build-and-push:
    name: Build and Push with Bumblebee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Download, Extract and Install Bumblebee (RAW)
        run: |
          set -e
          set -x
          
          # 【核心修正】我们不再拼接URL，而是直接让curl处理重定向
          # -J: 告诉curl使用服务器提供的Content-Disposition文件名
          # -O: 将文件保存为服务器建议的名称
          curl -sSL -o bee-linux-amd64.tar.gz https://github.com/solo-io/bumblebee/releases/download/v0.3.1/bee-linux-amd64.tar.gz

          echo "--- Verifying downloaded file ---"
          file bee-linux-amd64.tar.gz
          
          # 如果下载的不是gzip文件，则主动失败
          if ! file bee-linux-amd64.tar.gz | grep -q "gzip compressed data"; then
            echo "Error: Downloaded file is NOT a gzip archive!"
            # 打印文件内容以供诊断
            cat bee-linux-amd64.tar.gz
            exit 1
          fi

          echo "--- Extracting tarball ---"
          tar -xzf bee-linux-amd64.tar.gz
          
          echo "--- Installing bee binary ---"
          sudo install -m 755 bee /usr/local/bin/bee

      - name: 3. Verify bee installation
        run: bee version

      - name: 4. Build eBPF program using bee
        run: bee build bpf_program.c loader.c

      - name: 5. Verify build artifacts
        run: ls -la bpf_program.o loader
      
      # ---- 后续的Docker打包和推送步骤 (保持不变) ----
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: type=ref,event=branch,prefix=
      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./bee.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
