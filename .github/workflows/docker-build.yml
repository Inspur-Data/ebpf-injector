name: Build and Push Multi-Arch Image to Aliyun

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          clang llvm libbpf-dev linux-headers-$(uname -r) build-essential gcc

      - name: Compile eBPF program
        working-directory: ${{ github.workspace }}
        run: |
          echo "--- Starting eBPF compilation with correct include path ---"
          clang \
          -O2 -g -Wall \
          -target bpf \
          \
          # 【最终核心修正】明确地、无歧义地将libbpf的头文件路径添加进来
          -I/usr/include/bpf \
          \
          # 为了解决 __u64 等类型定义，我们依然需要内核头文件
          -I/usr/src/linux-headers-$(uname -r)/include \
          \
          -c bpf_program.c \
          -o bpf_program.o

      - name: Compile loader application
        working-directory: ${{ github.workspace }}
        run: gcc -g -Wall loader.c -o loader -lbpf
      
      # ---- 后续的Docker打包和推送步骤 (保持不变) ----
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=
            type=semver,pattern={{version}}
      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./final.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
