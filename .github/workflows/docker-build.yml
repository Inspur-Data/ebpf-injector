name: Ultimate Diagnostic Workflow

on: [workflow_dispatch]

jobs:
  diagnose-filesystem:
    name: Diagnose Runner Filesystem
    runs-on: ubuntu-latest

    steps:
      # 步骤1：只做一件事，检出代码
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      # 步骤2：不做任何其他事，只进行诊断
      - name: 2. Run Diagnostics
        run: |
          echo "--- Running diagnostics ---"
          
          echo ""
          echo "================================================="
          echo "||         VARIABLES & ENVIRONMENT           ||"
          echo "================================================="
          echo "1. whoami: $(whoami)"
          echo "2. pwd (current directory): $(pwd)"
          echo "3. GITHUB_WORKSPACE variable: ${{ github.workspace }}"
          echo "4. RUNNER_WORKSPACE variable: ${{ runner.workspace }}"
          
          echo ""
          echo "================================================="
          echo "||          FILE SYSTEM LISTING              ||"
          echo "================================================="
          echo ""
          echo "--- Listing files in current directory (pwd): ---"
          ls -la
          
          echo ""
          echo "--- Listing files in GITHUB_WORKSPACE (${{ github.workspace }}): ---"
          ls -la ${{ github.workspace }}
          
          echo ""
          echo "--- Recursive listing from current directory: ---"
          # -R: 递归地列出所有子目录和文件
          # This will show us everything, everywhere.
          ls -laR
          
          echo ""
          echo "================================================="
          echo "||             END OF DIAGNOSTICS            ||"
          echo "================================================="

