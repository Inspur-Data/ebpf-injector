name: Build and Push Multi-Arch Image to Aliyun

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3
      
      - name: Checkout libbpf repository into main repo
        uses: actions/checkout@v3
        with:
          repository: libbpf/libbpf
          ref: v1.2.0
          # 【核心】直接将libbpf克隆到主项目下的一个名为'libbpf'的子目录
          path: libbpf
      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          clang \
          llvm \
          libbpf-dev \
          linux-headers-$(uname -r) \
          build-essential
      
      # - name: Compile eBPF program
      #   run: |
      #     clang \
      #     -I /usr/include/bpf \
      #     -I /usr/include/x86_64-linux-gnu \
      #     -I /usr/src/linux-headers-$(uname -r)/include \
      #     -I /usr/src/linux-headers-$(uname -r)/arch/x86/include \
      #     -O2 -g \
      #     -target bpf \
      #     -D__KERNEL__ \
      #     -D__TARGET_ARCH_x86 \
      #     -c bpf_program.c \
      #     -o bpf_program.o    


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
