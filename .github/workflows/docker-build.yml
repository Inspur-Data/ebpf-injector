name: Debug eBPF Compilation

on: [workflow_dispatch]

jobs:
  debug-compile:
    name: Debug Compilation in CI Runner
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Install Dependencies
        run: |
          sudo apt-get update
          # 安装所有必要的编译依赖
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) build-essential gcc

      - name: 3. Final Compile Attempt (Kernel-Style)
        run: |
          # --- 诊断信息 ---
          echo "================ DIAGNOSTICS ================"
          echo "1. Kernel Version: $(uname -r)"
          echo "2. Clang Version: $(clang --version | head -n 1)"
          echo "3. Workspace: $(pwd)"
          echo "--- Listing files: ---"
          ls -la
          echo "==============================================="
          
          # --- 【终极核心编译命令】 ---
          echo ""
          echo "--- Starting eBPF compilation (Kernel-Style) ---"
          
          # 这套参数是模仿内核make M=... scripts/Makefile.build的调用方式
          # 它为clang提供了最完整的内核编译上下文
          clang \
            -O2 -g -Wall \
            -target bpf \
            -D__KERNEL__ \
            -D__TARGET_ARCH_x86 \
            -I/usr/src/linux-headers-$(uname -r)/include \
            -I/usr/src/linux-headers-$(uname -r)/arch/x86/include \
            -I/usr/src/linux-headers-$(uname -r)/arch/x86/include/uapi \
            -I/usr/src/linux-headers-$(uname -r)/include/uapi \
            -I/usr/src/linux-headers-$(uname -r)/include/generated/uapi \
            -I/usr/src/linux-headers-$(uname -r)/arch/x86/include/generated \
            -include /usr/src/linux-headers-$(uname -r)/include/linux/kconfig.h \
            -nostdinc \
            -isystem /usr/lib/clang/$(clang -dumpversion)/include \
            -c bpf_program.c \
            -o bpf_program.o

          echo "--- eBPF compilation finished. Exit code: $? ---"
          
          echo ""
          echo "--- Starting loader compilation ---"
          gcc -g -Wall loader.c -o loader -lbpf
          
          echo "--- Loader compilation finished. Exit code: $? ---"

          echo ""
          echo "--- Final artifacts: ---"
          ls -la loader bpf_program.o
