name: Build and Push Multi-Arch Image to Aliyun

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          clang llvm libbpf-dev linux-headers-$(uname -r) build-essential gcc

      - name: Compile eBPF program
        # 【核心修正1】明确指定工作目录
        working-directory: ${{ github.workspace }}
        run: |
          echo "--- Current directory: $(pwd) ---"
          echo "--- Listing files: ---"
          ls -la
          echo "--- Starting eBPF compilation ---"
          clang \
          -O2 -g -Wall \
          -target bpf \
          -D__KERNEL__ \
          -D__TARGET_ARCH_x86 \
          -I/usr/src/linux-headers-$(uname -r)/include \
          -I/usr/src/linux-headers-$(uname -r)/include/uapi \
          -I/usr/src/linux-headers-$(uname -r)/arch/x86/include \
          -I/usr/src/linux-headers-$(uname -r)/arch/x86/include/uapi \
          -nostdinc \
          -isystem /usr/lib/clang/$(clang -dumpversion)/include \
          -c bpf_program.c \
          -o bpf_program.o

      - name: Compile loader application
        # 【核心修正1】明确指定工作目录
        working-directory: ${{ github.workspace }}
        run: |
          echo "--- Current directory: $(pwd) ---"
          echo "--- Listing files: ---"
          ls -la
          echo "--- Starting loader compilation ---"
          gcc -g -Wall loader.c -o loader -lbpf

      # ---- 后续的Docker打包和推送步骤 ----

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          # 【核心修正2】构建上下文现在就是包含了所有产物的根目录
          context: .
          file: ./final.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
