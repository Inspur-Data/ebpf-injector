name: Build and Push Multi-Arch Image to Aliyun

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3

      # 【不再需要】我们不再需要单独克隆libbpf，因为dev包提供了我们需要的一切
      # - name: Checkout libbpf repository into main repo ...

      - name: Set up build environment
        run: |
          sudo apt-get update
          # 安装所有必要的工具和头文件
          sudo apt-get install -y \
          clang llvm libbpf-dev linux-headers-$(uname -r) build-essential gcc

      - name: Compile eBPF program
        # 【核心修正】这是最后、最关键的一步
        run: |
          # 我们不再自己拼凑-I参数，而是告诉clang像构建内核模块一样工作
          # 这会自动包含所有必需的头文件和宏定义
          clang \
          -O2 -g -Wall \
          -target bpf \
          -D__KERNEL__ \
          -D__TARGET_ARCH_x86 \
          # 使用-I包含已安装的内核头文件的主目录
          -I/usr/src/linux-headers-$(uname -r)/include \
          -I/usr/src/linux-headers-$(uname -r)/include/uapi \
          -I/usr/src/linux-headers-$(uname -r)/arch/x86/include \
          -I/usr/src/linux-headers-$(uname -r)/arch/x86/include/uapi \
          # 告诉clang不要包含标准的C库头文件，因为我们在“内核”环境
          -nostdinc \
          # 包含clang自身的资源头文件，以获取内置函数和类型
          -isystem /usr/lib/clang/$(clang -dumpversion)/include \
          -c bpf_program.c \
          -o bpf_program.o

      - name: Compile loader application
        run: gcc -g -Wall loader.c -o loader -lbpf
      
      # ---- 后续的Docker打包和推送步骤 ----

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          # 【重要】我们现在使用一个新的、极简的Dockerfile
          file: ./final.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
