name: Build eBPF with Bumblebee and Push (API Fetch)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector
  BEE_VERSION: v0.3.1

jobs:
  build-and-push:
    name: Build and Push with Bumblebee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Download Bumblebee Asset via GitHub API
        # 【核心修正】使用经过验证的、通过API下载的Action
        uses: jcbhmr/fetch-release-asset@v1
        with:
          # 仓库所有者和名称
          owner: solo-io
          repo: bumblebee
          # Git Tag
          tag: ${{ env.BEE_VERSION }}
          # 准确的资产文件名
          file: bee-linux-amd64.tar.gz
          # 将下载的文件保存为...
          target: ./bee-linux-amd64.tar.gz

      - name: 3. Extract and Install Bumblebee
        run: |
          set -e
          set -x
          echo "--- Verifying downloaded file ---"
          file bee-linux-amd64.tar.gz
          
          echo "--- Extracting tarball ---"
          tar -xzf bee-linux-amd64.tar.gz
          
          echo "--- Installing bee binary ---"
          sudo install -m 755 bee /usr/local/bin/bee

      - name: 4. Verify bee installation
        run: bee version

      - name: 5. Build eBPF program using bee
        run: bee build bpf_program.c loader.c

      - name: 6. Verify build artifacts
        run: ls -la bpf_program.o loader
      
      # ---- 后续的Docker打包和推送步骤 (保持不变) ----
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: type=ref,event=branch,prefix=
      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./bee.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
