name: Build eBPF with Bumblebee and Push (Final)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector
  BEE_VERSION: v0.3.1

jobs:
  build-and-push:
    name: Build and Push with Bumblebee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Download and install Bumblebee (bee) manually
        # 【核心修正】放弃第三方Action，使用最基础的curl和install命令
        run: |
          set -e
          set -x
          # 构造下载URL
          BEE_URL="https://github.com/solo-io/bumblebee/releases/download/${BEE_VERSION}/bee_linux_amd64"
          # 使用curl下载
          curl -L -o bee_linux_amd64 "${BEE_URL}"
          # 使用install命令，将文件移动到/usr/local/bin并赋予可执行权限
          sudo install -m 755 bee_linux_amd64 /usr/local/bin/bee
          # 清理下载的文件
          rm bee_linux_amd64

      - name: 3. Verify bee installation
        run: bee version

      - name: 4. Build eBPF program using bee
        run: bee build bpf_program.c loader.c

      - name: 5. Verify build artifacts
        run: ls -la bpf_program.o loader
      
      # ---- 后续的Docker打包和推送步骤 (保持不变) ----
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=
            type=semver,pattern={{version}}
      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./bee.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
