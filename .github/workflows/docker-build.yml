name: Debug eBPF Compilation

# 只允许手动触发
on: [workflow_dispatch]

jobs:
  debug-compile:
    name: Debug Compilation in CI Runner
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出您的代码
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      # 步骤2：安装所有必要的编译依赖
      - name: 2. Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) build-essential gcc

      # 步骤3：执行最终的、带有完整诊断的编译命令
      - name: 3. Final Compile Attempt with Diagnostics
        run: |
          # --- 诊断部分 ---
          echo "================ DIAGNOSTICS ================"
          echo "1. Current User: $(whoami)"
          echo "2. Current Directory (pwd): $(pwd)"
          echo "3. GitHub Workspace Variable: ${{ github.workspace }}"
          echo "4. Listing files in current directory:"
          ls -la
          echo "5. Listing files in workspace directory:"
          ls -la ${{ github.workspace }}
          echo "==============================================="
          
          # --- 编译部分 ---
          echo ""
          echo "--- Starting eBPF compilation ---"
          # 我们不再使用 working-directory，而是直接 cd 到 workspace
          cd ${{ github.workspace }}

          clang \
            -O2 -g -Wall \
            -target bpf \
            -I/usr/include/bpf \
            -I/usr/src/linux-headers-$(uname -r)/include \
            -c bpf_program.c \
            -o bpf_program.o
          
          echo "--- eBPF compilation finished. Exit code: $? ---"
          
          echo ""
          echo "--- Starting loader compilation ---"
          gcc -g -Wall loader.c -o loader -lbpf
          
          echo "--- Loader compilation finished. Exit code: $? ---"

          echo ""
          echo "--- Final artifacts: ---"
          ls -la loader bpf_program.o

          