name: Ultimate Debug and Build with Bumblebee

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector
  BEE_VERSION: v0.3.1

jobs:
  build-and-push:
    name: Build and Push with Bumblebee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Download and Diagnose Bumblebee (bee)
        run: |
          set -e
          set -x
          
          # 构造下载URL
          BEE_URL="https://github.com/solo-io/bumblebee/releases/download/${BEE_VERSION}/bee_linux_amd64"
          echo "--- Downloading from URL: ${BEE_URL} ---"
          
          # 使用curl下载，-v 参数会打印详细的网络交互过程
          curl -v -L -o bee_linux_amd64 "${BEE_URL}"
          
          echo ""
          echo "--- DIAGNOSING DOWNLOADED FILE ---"
          # 1. 打印文件类型
          echo "File type:"
          file bee_linux_amd64
          
          # 2. 打印文件的前10行内容
          echo "First 10 lines of the file:"
          head -n 10 bee_linux_amd64
          echo "--- END OF DIAGNOSIS ---"
          
          # 只有当文件是可执行二进制文件时，才继续
          if file bee_linux_amd64 | grep -q "ELF 64-bit LSB executable"; then
            echo "File is a valid executable. Proceeding with installation."
            sudo install -m 755 bee_linux_amd64 /usr/local/bin/bee
            rm bee_linux_amd64
          else
            echo "Error: Downloaded file is not a valid executable!"
            exit 1
          fi

      - name: 3. Verify bee installation
        run: bee version

      - name: 4. Build eBPF program using bee
        run: bee build bpf_program.c loader.c

      - name: 5. Verify build artifacts
        run: ls -la bpf_program.o loader
      
      # ---- 后续的Docker打包和推送步骤 (保持不变) ----
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=
      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./bee.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
