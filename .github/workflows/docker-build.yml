name: Build eBPF with Bumblebee and Push (Final Corrected)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: ebpf-injector
  IMAGE_NAME: ebpf-injector
  BEE_VERSION: v0.3.1

jobs:
  build-and-push:
    name: Build and Push with Bumblebee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Download, Extract and Install Bumblebee (bee)
        run: |
          set -e
          set -x
          
          # 【核心修正】使用正确的资产名称 bee-linux-amd64.tar.gz
          ASSET_NAME="bee-linux-amd64.tar.gz"
          BEE_URL="https://github.com/solo-io/bumblebee/releases/download/${BEE_VERSION}/${ASSET_NAME}"
          
          echo "--- Downloading from correct URL: ${BEE_URL} ---"
          curl -L -o "${ASSET_NAME}" "${BEE_URL}"
          
          echo "--- Verifying downloaded file ---"
          # 确认下载的是一个gzip压缩包
          file "${ASSET_NAME}"
          
          # 【核心修正】解压缩.tar.gz文件
          # tar命令会自动解压出名为 'bee' 的二进制文件
          tar -xzf "${ASSET_NAME}"
          
          echo "--- Installing bee binary ---"
          # 将解压出的'bee'文件安装到系统路径
          sudo install -m 755 bee /usr/local/bin/bee
          
          # 清理工作
          rm "${ASSET_NAME}" bee

      - name: 3. Verify bee installation
        run: bee version

      - name: 4. Build eBPF program using bee
        run: bee build bpf_program.c loader.c

      - name: 5. Verify build artifacts
        run: ls -la bpf_program.o loader
      
      # ---- 后续的Docker打包和推送步骤 (保持不变) ----
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME_ALI }}
          password: ${{ secrets.PASSWORD_ALI }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: type=ref,event=branch,prefix=
      - name: Build and push final image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./bee.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
