name: Final eBPF Build

on: [workflow_dispatch]

jobs:
  build:
    name: Build eBPF and Loader
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3

      - name: 2. Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev build-essential gcc

      - name: 3. Compile eBPF program
        run: |
          echo "--- Starting final eBPF compilation ---"
          
          # 最终的、最简单的clang命令
          clang \
            -O2 -g -Wall \
            -target bpf \
            \
            # 【终极核心修正】
            # -I.  告诉clang，把当前目录('.')也作为头文件搜索路径
            # 这样，当代码中 #include <bpf/bpf_helpers.h> 时，
            # 它会去寻找 ./bpf/bpf_helpers.h
            # 或者，我们可以直接修改C代码
            -I. \
            \
            -c bpf_program.c \
            -o bpf_program.o

      - name: 4. Compile loader
        run: gcc -g -Wall loader.c -o loader -lbpf

      - name: 5. Verify artifacts
        run: ls -la loader bpf_program.o
